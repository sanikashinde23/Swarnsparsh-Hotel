<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form with Overlay</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 
</head>
    <link rel="stylesheet" href="contact.css">
</head>
<body>  

   <section class="header">

        <nav class="navbar">
            <div class="logo">
                <h1>Hotel</h1>
            </div>
            <div class="link">
                <a href="./home.html">Home</a>
                <a href="./about.html">About</a>
                <a href="./package.html">packages</a>
                <a href="./contact.html">Contact</a>
            </div>
        </nav>
    </section>
    <div class="contact-container">
        <div class="contact-form">
            <h2>Send us a Feedback</h2>
            <form action="#" method="post">
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <input type="text" placeholder="Contact No" required>
                <textarea rows="4" placeholder="Feedback" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
        <div class="contact-info">
            <h2>Contact us</h2>
            <BR>
            <ul>
                <li><strong>Address:</strong>  Balewadi 21th High Street, Mumbai</li><br>
                <li><strong>Phone:</strong> + 91 8976654309</li><br>
                <li><strong>Email:</strong> Swarnsparsh@34.com</li><br>
                <li><strong>Website:</strong> WWW.Swarnsparsh.com</li><br>
            </ul>
        </div>
    </div>


    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const form = document.querySelector("form");

            form.addEventListener("submit", function(event) {
                event.preventDefault(); // Prevent default form submission

                alert("Your feedback has been successfully submitted!"); // Show the alert dialog
                form.reset(); // Reset the form fields after submission (optional)
            });
        });
    </script>


 <!-- Footer Section -->
 <footer class="footer">
    <div class="footer-container">
        <div class="footer-info">
            <p><i class="fas fa-map-marker-alt"></i> Mumbai, India</p>
            <p><i class="fas fa-phone"></i> +91 98765 43210</p>
            <p><i class="fas fa-envelope"></i> info@swarnsparshhotel.com</p>
        </div>
        <div class="footer-social">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
        </div>
    </div>
    <p class="footer-bottom">© <span id="year"></span> Swarnsparsh Hotel.</p>
</footer>

</body>
</html>
